<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dual-Task Arrows - Stable Stereo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background-color: #1A252F; font-family: sans-serif; user-select: none; }
      canvas { display: block; width: 100vw; height: 100vh; }
      
      /* Dokunmatik Stereo (VR Box) Geçiş Ekranı */
      #girisEkranı {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #2C3E50; color: white; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999; text-align: center;
      }
      .buton {
        background: #2ECC71; color: white; border: none; padding: 15px 40px;
        font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px;
      }
      
      /* Ekranı Tam Ortadan Bölen VR Box Çizgisi */
      #vr-ayrac {
        position: fixed; top: 0; left: 50%; width: 2px; height: 100%;
        background: rgba(0,0,0,0.4); display: none; z-index: 999;
      }
    </style>
  </head>
  <body>

    <div id="vr-ayrac"></div>
    <div id="girisEkranı">
      <h1 style="margin: 0; font-size: 28px; letter-spacing: 2px;">DUAL-TASK ARROWS</h1>
      <p style="color: #BDC3C7; max-width: 80%; font-size: 14px; margin-top: 10px;">
        Mavi Ok: Hareket Yönüne Bak<br>Turuncu Ok: Ucun Gösterdiği Yöne Bak
      </p>
      <button class="buton" onclick="oyunuBaslat()">BAŞLAT (STEREO MODU)</button>
    </div>

    <script>
      let scene, renderer, leftCamera, rightCamera;
      let oyunAktif = false;
      let aktifOk = null;
      let dogruYon = "";
      let akissYonu = "";
      let okRengi = "";
      let okHizi = 0.04;
      let sonOkZamani = 0;

      // Hastanın baş hareketi (Jiroskop) simülasyonu için imleç koordinatları
      let imlecX = 0, imlecY = 0;

      function oyunuBaslat() {
        document.getElementById('girisEkranı').style.display = 'none';
        document.getElementById('vr-ayrac').style.display = 'block';
        
        // Mobil cihazlarda tam ekranı tetikle
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
        
        init3D();
        oyunAktif = true;
        animate();
      }

      function init3D() {
        // 1. Sahne Kurulumu
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1A252F);

        // 2. Çift Kamera Kurulumu (Stereo / İki Göz Eşitlemesi)
        const aspect = (window.innerWidth / 2) / window.innerHeight;
        leftCamera = new THREE.PerspectiveCamera(60, aspect, 0.1, 100);
        rightCamera = new THREE.PerspectiveCamera(60, aspect, 0.1, 100);
        
        // Gözler arası mesafe (Interpupillary distance ipd) klinik VR Box ayarı
        leftCamera.position.set(-0.06, 0, 0);
        rightCamera.position.set(0.06, 0, 0);

        // 3. Renderer Kurulumu
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. Işıklandırma
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 5, 5).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 5. Cevap Hedefleri (Görsel Yardımcı Küreler - Sabit)
        createTarget(0, 1.8, -3, "yukari", 0xBDC3C7);
        createTarget(0, -1.8, -3, "asagi", 0xBDC3C7);
        createTarget(-2.2, 0, -3, "sol", 0xBDC3C7);
        createTarget(2.2, 0, -3, "sag", 0xBDC3C7);

        // VR Box için Jiroskop / Hareket Takibi
        window.addEventListener('deviceorientation', handleOrientation, true);
        // PC'de test edebilmeniz için mouse takibi yardımı
        window.addEventListener('mousemove', (e) => {
          imlecX = ((e.clientX / window.innerWidth) * 2 - 1) * 2;
          imlecY = (-(e.clientY / window.innerHeight) * 2 + 1) * 2;
        });
      }

      function createTarget(x, y, z, yon, renk) {
        const geo = new THREE.BoxGeometry(0.5, 0.4, 0.1);
        const mat = new THREE.MeshLambertMaterial({ color: renk });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        mesh.userData = { yon: yon, orijinalRenk: renk };
        scene.add(mesh);
      }

      function handleOrientation(event) {
        // Telefon hareket ettikçe bakış açısını merkezler
        if (!event.gamma || !event.beta) return;
        imlecX = (event.gamma / 30) * 2; 
        imlecY = ((event.beta - 70) / 30) * 2; 
      }

      function hacimliOkUret() {
        if (aktifOk) {
          scene.remove(aktifOk);
          aktifOk = null;
        }

        const kuralTipi = Math.random() > 0.5 ? "mavi" : "turuncu";
        okRengi = kuralTipi === "mavi" ? 0x3498DB : 0xE67E22;

        const yonler = ["sol", "sag", "yukari", "asagi"];
        akissYonu = yonler[Math.floor(Math.random() * yonler.length)];
        let ucYonu = yonler[Math.floor(Math.random() * yonler.length)];

        dogruYon = (kuralTipi === "mavi") ? akissYonu : ucYonu;

        // Ok Obje Grubu
        aktifOk = new THREE.Group();

        // Ebb & Flow Kalınlığında 3D Gövde
        const govdeGeo = new THREE.BoxGeometry(0.2, 0.4, 0.2);
        const mat = new THREE.MeshLambertMaterial({ color: okRengi });
        const govdeMesh = new THREE.Mesh(govdeGeo, mat);
        govdeMesh.position.y = -0.1;
        aktifOk.add(govdeMesh);

        // Hacimli 3D Ok Ucu (Piramit)
        const ucGeo = new THREE.ConeGeometry(0.22, 0.3, 4);
        const ucMesh = new THREE.Mesh(ucGeo, mat);
        ucMesh.position.y = 0.25;
        ucMesh.rotation.y = Math.PI / 4; 
        aktifOk.add(ucMesh);

        // Okun Ucunu Doğru Yöne Çevir
        if (ucYonu === "sol") aktifOk.rotation.z = Math.PI / 2;
        if (ucYonu === "sag") aktifOk.rotation.z = -Math.PI / 2;
        if (ucYonu === "asagi") aktifOk.rotation.z = Math.PI;

        // Başlangıç Pozisyonu
        let startX = 0, startY = 0;
        if (akissYonu === "sol") startX = 2.5;
        if (akissYonu === "sag") startX = -2.5;
        if (akissYonu === "yukari") startY = -1.8;
        if (akissYonu === "asagi") startY = 1.8;

        aktifOk.position.set(startX, startY, -2.8);
        scene.add(aktifOk);
      }

      function kontrolEt() {
        // Hastanın bakış doğrultusuna göre hangi bölgeye odaklandığını yakalar
        let tahminiYon = "";
        if (imlecY > 1.0 && Math.abs(imlecX) < 1.0) tahminiYon = "yukari";
        else if (imlecY < -1.0 && Math.abs(imlecX) < 1.0) tahminiYon = "asagi";
        else if (imlecX < -1.2 && Math.abs(imlecY) < 1.0) tahminiYon = "sol";
        else if (imlecX > 1.2 && Math.abs(imlecY) < 1.0) tahminiYon = "sag";

        if (tahminiYon === dogruYon) {
          cevapGeriBildirimi(tahminiYon, 0x2ECC71); // Doğru: Yeşil
          hacimliOkUret();
        } else if (tahminiYon !== "" && tahminiYon !== dogruYon) {
          cevapGeriBildirimi(tahminiYon, 0xE74C3C); // Yanlış: Kırmızı
          hacimliOkUret();
        }
      }

      function cevapGeriBildirimi(yon, renkKodu) {
        scene.traverse((object) => {
          if (object.userData && object.userData.yon === yon) {
            object.material.color.setHex(renkKodu);
            setTimeout(() => {
              object.material.color.setHex(object.userData.orijinalRenk);
            }, 400);
          }
        });
      }

      function animate(time) {
        if (!oyunAktif) return;
        requestAnimationFrame(animate);

        // Belirli aralıklarla ok üretimi yönetimi
        if (time - sonOkZamani > 4000 || !aktifOk) {
          hacimliOkUret();
          sonOkZamani = time;
        }

        // Okun fiziksel akış hareketi
        if (aktifOk) {
          if (akissYonu === "sol") aktifOk.position.x -= okHizi;
          if (akissYonu === "sag") aktifOk.position.x += okHizi;
          if (akissYonu === "yukari") aktifOk.position.y += okHizi;
          if (akissYonu === "asagi") aktifOk.position.y -= okHizi;

          // Ekrandan çıkarsa cezalandır ve yeni ok getir
          if (Math.abs(aktifOk.position.x) > 3 || Math.abs(aktifOk.position.y) > 2.2) {
            hacimliOkUret();
          }
          kontrolEt();
        }

        // --- EN KRİTİK NOKTA: EKRANI TAM ORTADAN İKİYE BÖLÜP STEREO ÇİZMEK ---
        // Sol Göz Çizimi
        renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setScissorTest(true);
        renderer.render(scene, leftCamera);

        // Sağ Göz Çizimi
        renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setScissorTest(true);
        renderer.render(scene, rightCamera);
      }

      window.addEventListener('resize', () => {
        if (!oyunAktif) return;
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height);
        leftCamera.aspect = (width / 2) / height;
        leftCamera.updateProjectionMatrix();
        rightCamera.aspect = (width / 2) / height;
        rightCamera.updateProjectionMatrix();
      });
    </script>
  </body>
</html>
