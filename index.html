<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dual-Task Arrows - 90 Degree Calibrated VR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background-color: #111a22; font-family: sans-serif; user-select: none; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #girisEkranı {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1A252F; color: white; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999; text-align: center;
      }
      .buton {
        background: #2ECC71; color: white; border: none; padding: 15px 40px;
        font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px;
      }
      #vr-ayrac {
        position: fixed; top: 0; left: 50%; width: 2px; height: 100%;
        background: rgba(0,0,0,0.6); display: none; z-index: 999;
      }
    </style>
  </head>
  <body>

    <div id="vr-ayrac"></div>
    <div id="girisEkranı">
      <h1 style="margin: 0; font-size: 28px; letter-spacing: 2px; color: #00FFCC;">DUAL-TASK ARROWS</h1>
      <p style="color: #BDC3C7; max-width: 80%; font-size: 15px; margin-top: 10px; line-height: 1.5;">
        <span style="color: #00D2FF; font-weight: bold;">NEON MAVİ OK:</span> Akış Yönüne Bak<br>
        <span style="color: #FF9F43; font-weight: bold;">NEON TURUNCU OK:</span> Ucun Gösterdiği Yöne Bak
      </p>
      <button class="buton" onclick="oyunuBaslat()">EGZERSİZİ BAŞLAT</button>
    </div>

    <script>
      let scene, renderer, leftCamera, rightCamera;
      let oyunAktif = false, aktifOk = null;
      let dogruYon = "", akissYonu = "", okRengi = "";
      let okHizi = 0.0116; 
      let sonOkZamani = 0;

      // Klinik Döngü Değişkenleri
      let skor = 0;
      let hamleYapildi = false;      
      let merkezBekleniyor = false;  
      let okDogumZamani = 0;
      const ANALIZ_SURESI = 450;     

      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;
      const smoothing = 0.15; 

      let leftScoreText, rightScoreText;
      let leftFeedbackMesh, rightFeedbackMesh;
      let feedbackDisplayTime = 0;
      let audioCtx = null;

      function oynatSes(tip) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (tip === "dogru") {
          osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
          osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08);
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
        } else {
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(120, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      }

      function oyunuBaslat() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation);
          });
        } else { window.addEventListener('deviceorientation', handleOrientation); }
        document.getElementById('girisEkranı').style.display = 'none';
        document.getElementById('vr-ayrac').style.display = 'block';
        init3D();
        oyunAktif = true;
        animate(0);
      }

      function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111a22);
        const aspect = (window.innerWidth / 2) / window.innerHeight;
        leftCamera = new THREE.PerspectiveCamera(70, aspect, 0.1, 100);
        rightCamera = new THREE.PerspectiveCamera(70, aspect, 0.1, 100);
        leftCamera.position.set(-0.06, 0, 0.5);
        rightCamera.position.set(0.06, 0, 0.5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x666666));
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(0, 4, 6); scene.add(light);

        createTarget(0, 1.4, -3.5, "yukari");
        createTarget(0, -1.4, -3.5, "asagi");
        createTarget(-1.8, 0, -3.5, "sol");
        createTarget(1.8, 0, -3.5, "sag");

        const cursorGeo = new THREE.RingGeometry(0.02, 0.035, 32);
        const cursorMat = new THREE.MeshBasicMaterial({ color: 0x00FFCC, side: THREE.DoubleSide });
        leftCursor = new THREE.Mesh(cursorGeo, cursorMat); scene.add(leftCursor);
        rightCursor = leftCursor.clone(); scene.add(rightCursor);

        function createScoreTexture(skorDegeri) {
          let canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
          let ctx = canvas.getContext('2d'); ctx.fillStyle = '#2C3E50'; ctx.fillRect(0, 0, 256, 64);
          ctx.fillStyle = '#FFFFFF'; ctx.font = 'Bold 32px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('SKOR: ' + skorDegeri, 128, 44);
          return new THREE.CanvasTexture(canvas);
        }
        const scoreGeo = new THREE.PlaneGeometry(0.6, 0.15);
        leftScoreText = new THREE.Mesh(scoreGeo, new THREE.MeshBasicMaterial({ map: createScoreTexture(0) }));
        leftScoreText.position.set(-0.06, 1.9, -3); scene.add(leftScoreText);
        rightScoreText = leftScoreText.clone(); rightScoreText.position.set(0.06, 1.9, -3); scene.add(rightScoreText);

        function createFBTex(type) {
          let canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
          let ctx = canvas.getContext('2d'); ctx.font = 'Bold 100px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          if(type==='ok'){ ctx.fillStyle='#2ECC71'; ctx.fillText('✓',64,64); } else { ctx.fillStyle='#E74C3C'; ctx.fillText('✗',64,64); }
          return new THREE.CanvasTexture(canvas);
        }
        this.texOk = createFBTex('ok'); this.texNo = createFBTex('no');
        const fbGeo = new THREE.PlaneGeometry(0.4, 0.4);
        leftFeedbackMesh = new THREE.Mesh(fbGeo, new THREE.MeshBasicMaterial({ map: this.texOk, transparent: true, opacity: 0 }));
        leftFeedbackMesh.position.set(-0.06, 0, -2.5); scene.add(leftFeedbackMesh);
        rightFeedbackMesh = leftFeedbackMesh.clone(); rightFeedbackMesh.position.set(0.06, 0, -2.5); scene.add(rightFeedbackMesh);

        window.addEventListener('mousemove', (e) => {
          targetX = ((e.clientX / window.innerWidth) * 2 - 1) * 2.2;
          targetY = (-(e.clientY / window.innerHeight) * 2 + 1) * 1.8;
        });
      }

      function guncelleSkorPaneli() {
        function createScoreTexture(skorDegeri) {
          let canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
          let ctx = canvas.getContext('2d'); ctx.fillStyle = '#2C3E50'; ctx.fillRect(0, 0, 256, 64);
          ctx.fillStyle = '#FFFFFF'; ctx.font = 'Bold 32px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('SKOR: ' + skorDegeri, 128, 44);
          return new THREE.CanvasTexture(canvas);
        }
        let yeniDoku = createScoreTexture(skor);
        leftScoreText.material.map = yeniDoku; leftScoreText.material.needsUpdate = true;
        rightScoreText.material.map = yeniDoku; rightScoreText.material.needsUpdate = true;
      }

      function createTarget(x, y, z, yon) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.35, 0.08), new THREE.MeshLambertMaterial({ color: 0x7F8C8D }));
        mesh.position.set(x, y, z); mesh.userData = { yon: yon, orijinalRenk: 0x7F8C8D };
        scene.add(mesh);
      }

      // --- MUTLAK 90 DERECE VR ORYANTASYON KALİBRASYONU ---
      function handleOrientation(e) {
        if (e.gamma === null || e.beta === null) return;
        
        // Telefon gözlük içinde tam dikey (landscape modunda 90 derece dik) durur.
        // Bu yüzden beta ekseninden 90 çıkararak tam karşıya bakışı 0 kabul ediyoruz.
        let diklikAcisi = e.beta - 90; 

        targetX = -(diklikAcisi / 25) * 2.2; 
        targetY = (e.gamma / 22) * 1.8;
      }

      function hacimliOkUret() {
        if (aktifOk) scene.remove(aktifOk);
        
        hamleYapildi = false;
        okDogumZamani = performance.now();

        const kural = Math.random() > 0.5 ? "mavi" : "turuncu";
        okRengi = kural === "mavi" ? 0x00D2FF : 0xFF9F43;
        const yonler = ["sol", "sag", "yukari", "asagi"];
        akissYonu = yonler[Math.floor(Math.random()*4)];
        let ucYonu = yonler[Math.floor(Math.random()*4)];
        dogruYon = (kural === "mavi") ? akissYonu : ucYonu;

        aktifOk = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: okRengi, roughness: 0.2, metalness: 0.1 });
        const g = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.45, 0.25), mat); g.position.y = -0.15; aktifOk.add(g);
        const u = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.35, 4), mat); u.position.y = 0.25; u.rotation.y = Math.PI/4; aktifOk.add(u);
        
        if (ucYonu === "sol") aktifOk.rotation.z = Math.PI/2;
        if (ucYonu === "sag") aktifOk.rotation.z = -Math.PI/2;
        if (ucYonu === "asagi") aktifOk.rotation.z = Math.PI;

        let sX = 0, sY = 0;
        if (akissYonu === "sol") sX = 2; if (akissYonu === "sag") sX = -2;
        if (akissYonu === "yukari") sY = -1.4; if (akissYonu === "asagi") sY = 1.4;
        aktifOk.position.set(sX, sY, -3.2); scene.add(aktifOk);
      }

      function kontrolEt() {
        if (!aktifOk) return;

        // 1. AŞAMA: Hasta kafasını geniş nötr çembere geri getirene kadar yeni ok üretme
        if (merkezBekleniyor) {
          if (Math.abs(currentX) < 0.32 && Math.abs(currentY) < 0.32) {
            merkezBekleniyor = false; 
            hacimliOkUret();
          }
          return; 
        }

        // 2. AŞAMA: Ok çıktıktan sonraki bilişsel analiz süresi (450ms) dolmadıysa hareketleri engelle
        if (performance.now() - okDogumZamani < ANALIZ_SURESI) return;
        if (hamleYapildi) return;

        let algilananYon = "";
        const limitX = 0.65, limitY = 0.55; 

        // Baskın eksen filtresi
        if (Math.abs(currentX) > limitX || Math.abs(currentY) > limitY) {
          if (Math.abs(currentX) > Math.abs(currentY)) {
            algilananYon = currentX > 0 ? "sag" : "sol";
          } else {
            algilananYon = currentY > 0 ? "yukari" : "asagi";
          }
        }

        // 3. AŞAMA: Net kafa hareketi algılandığı an beklemeden tetikle
        if (algilananYon !== "") {
          hamleYapildi = true; 
          merkezBekleniyor = true; 

          if (algilananYon === dogruYon) {
            skor += 10; guncelleSkorPaneli();
            oynatSes("dogru"); feedbackGoster("dogru");
            cevapGeriBildirimi(algilananYon, 0x00FF66);
          } else {
            oynatSes("yanlis"); feedbackGoster("yanlis");
            cevapGeriBildirimi(algilananYon, 0xFF3333);
          }
        }
      }

      function cevapGeriBildirimi(yon, renkKodu) {
        scene.traverse((object) => {
          if (object.userData && object.userData.yon === yon) {
            object.material.color.setHex(renkKodu);
            setTimeout(() => { object.material.color.setHex(object.userData.orijinalRenk); }, 300);
          }
        });
      }

      function feedbackGoster(durum) {
        let tex = durum === "dogru" ? this.texOk : this.texNo;
        leftFeedbackMesh.material.map = tex; leftFeedbackMesh.material.opacity = 1;
        rightFeedbackMesh.material.map = tex; rightFeedbackMesh.material.opacity = 1;
        feedbackDisplayTime = performance.now();
      }

      function animate(time) {
        if (!oyunAktif) return;
        requestAnimationFrame(animate);

        if ((time - sonOkZamani > 8000 || !aktifOk) && !merkezBekleniyor) { 
          hacimliOkUret(); 
          sonOkZamani = time; 
        }

        currentX += (targetX - currentX) * smoothing;
        currentY += (targetY - currentY) * smoothing;

        leftCursor.position.set(currentX - 0.06, currentY, -2.8);
        rightCursor.position.set(currentX + 0.06, currentY, -2.8);

        if (performance.now() - feedbackDisplayTime > 700) {
          leftFeedbackMesh.material.opacity *= 0.85;
          rightFeedbackMesh.material.opacity *= 0.85;
        }

        if (aktifOk && !merkezBekleniyor) {
          if (akissYonu === "sol") aktifOk.position.x -= okHizi;
          if (akissYonu === "sag") aktifOk.position.x += okHizi;
          if (akissYonu === "yukari") aktifOk.position.y += okHizi;
          if (akissYonu === "asagi") aktifOk.position.y -= okHizi;

          if (Math.abs(aktifOk.position.x) > 2.5 || Math.abs(aktifOk.position.y) > 1.8) {
            oynatSes("yanlis"); feedbackGoster("yanlis"); 
            merkezBekleniyor = true; 
          }
        }
        
        kontrolEt();

        // Sol Göz
        renderer.setScissor(0, 0, window.innerWidth/2, window.innerHeight);
        renderer.setViewport(0, 0, window.innerWidth/2, window.innerHeight);
        renderer.setScissorTest(true); renderer.render(scene, leftCamera);

        // Sağ Göz
        renderer.setScissor(window.innerWidth/2, 0, window.innerWidth/2, window.innerHeight);
        renderer.setViewport(window.innerWidth/2, 0, window.innerWidth/2, window.innerHeight);
        renderer.setScissorTest(true); renderer.render(scene, rightCamera);
      }

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        const aspect = (window.innerWidth / 2) / window.innerHeight;
        leftCamera.aspect = rightCamera.aspect = aspect;
        leftCamera.updateProjectionMatrix(); rightCamera.updateProjectionMatrix();
      });
    </script>
  </body>
</html>
