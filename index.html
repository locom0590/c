<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dual-Task Arrows - Micro-Movement VR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background-color: #111a22; font-family: sans-serif; user-select: none; }
      canvas { display: block; width: 100vw; height: 100vh; }
      
      #girisEkranı {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1A252F; color: white; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999; text-align: center;
      }
      .buton {
        background: #2ECC71; color: white; border: none; padding: 15px 40px;
        font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px;
      }
      #vr-ayrac {
        position: fixed; top: 0; left: 50%; width: 2px; height: 100%;
        background: rgba(0,0,0,0.6); display: none; z-index: 999;
      }
    </style>
  </head>
  <body>

    <div id="vr-ayrac"></div>
    <div id="girisEkranı">
      <h1 style="margin: 0; font-size: 28px; letter-spacing: 2px; color: #00FFCC;">DUAL-TASK ARROWS</h1>
      <p style="color: #BDC3C7; max-width: 80%; font-size: 15px; margin-top: 10px; line-height: 1.5;">
        <span style="color: #00D2FF; font-weight: bold;">NEON MAVİ OK:</span> Hareket Ettiği Yöne Bak<br>
        <span style="color: #FF9F43; font-weight: bold;">NEON TURUNCU OK:</span> Ucunun Gösterdiği Yöne Bak
      </p>
      <button class="buton" onclick="oyunuBaslat()">EGZERSIZI BASLAT</button>
    </div>

    <script>
      let scene, renderer, leftCamera, rightCamera;
      let oyunAktif = false;
      let aktifOk = null;
      let dogruYon = "";
      let akissYonu = "";
      let okRengi = "";
      
      let okHizi = 0.0116; 
      let sonOkZamani = 0;

      let skor = 0;
      let leftScoreText, rightScoreText;
      let leftFeedbackMesh, rightFeedbackMesh;
      let feedbackGosterimZamani = 0;

      let leftCursor, rightCursor;
      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;
      const yumusatma = 0.15; 

      let audioCtx = null;

      function oynatSes(tip) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (tip === "dogru") {
          osc.type = "sine";
          osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
          osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); 
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.25);
        } else {
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(120, audioCtx.currentTime); 
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        }
      }

      function oyunuBaslat() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
              if (permissionState === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation, true);
              }
            })
            .catch(console.error);
        } else {
          window.addEventListener('deviceorientation', handleOrientation, true);
        }

        document.getElementById('girisEkranı').style.display = 'none';
        document.getElementById('vr-ayrac').style.display = 'block';
        
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
        
        init3D();
        oyunAktif = true;
        animate(0);
      }

      function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111a22); 

        const aspect = (window.innerWidth / 2) / window.innerHeight;
        leftCamera = new THREE.PerspectiveCamera(70, aspect, 0.1, 100);
        rightCamera = new THREE.PerspectiveCamera(70, aspect, 0.1, 100);
        
        leftCamera.position.set(-0.06, 0, 0.5);
        rightCamera.position.set(0.06, 0, 0.5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(0, 4, 6).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x555555));

        // CEVAP HEDEFLERİ
        createTarget(0, 1.4, -3.5, "yukari", 0x7F8C8D);
        createTarget(0, -1.4, -3.5, "asagi", 0x7F8C8D);
        createTarget(-1.8, 0, -3.5, "sol", 0x7F8C8D);
        createTarget(1.8, 0, -3.5, "sag", 0x7F8C8D);

        // BAŞ HAREKETLERİNİ TAKİP EDEN PARLAK VR İMLEÇLERİ
        const cursorGeo = new THREE.RingGeometry(0.02, 0.035, 32);
        const cursorMat = new THREE.MeshBasicMaterial({ color: 0x00FFCC, side: THREE.DoubleSide, depthTest: false });
        leftCursor = new THREE.Mesh(cursorGeo, cursorMat);
        leftCursor.renderOrder = 999;
        scene.add(leftCursor);

        rightCursor = leftCursor.clone();
        scene.add(rightCursor);

        // SKOR VE GERI BILDIRIM KANVASLARI
        function createScoreTexture(skorDegeri) {
          let canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 64;
          let ctx = canvas.getContext('2d');
          ctx.fillStyle = '#2C3E50'; ctx.fillRect(0, 0, 256, 64);
          ctx.fillStyle = '#FFFFFF'; ctx.font = 'Bold 32px sans-serif';
          ctx.textAlign = 'center'; ctx.fillText('SKOR: ' + skorDegeri, 128, 44);
          return new THREE.CanvasTexture(canvas);
        }

        const scoreGeo = new THREE.PlaneGeometry(0.6, 0.15);
        leftScoreText = new THREE.Mesh(scoreGeo, new THREE.MeshBasicMaterial({ map: createScoreTexture(0) }));
        leftScoreText.position.set(-0.06, 1.9, -3);
        scene.add(leftScoreText);

        rightScoreText = leftScoreText.clone();
        rightScoreText.position.set(0.06, 1.9, -3);
        scene.add(rightScoreText);

        function createFeedbackTexture(tur) {
          let canvas = document.createElement('canvas');
          canvas.width = 128; canvas.height = 128;
          let ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, 128, 128);
          ctx.font = 'Bold 100px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          if (tur === "dogru") { ctx.fillStyle = '#2ECC71'; ctx.fillText('✓', 64, 64); }
          else { ctx.fillStyle = '#E74C3C'; ctx.fillText('✗', 64, 64); }
          let tex = new THREE.CanvasTexture(canvas);
          return tex;
        }

        this.texDogru = createFeedbackTexture("dogru");
        this.texYanlis = createFeedbackTexture("yanlis");

        const feedbackGeo = new THREE.PlaneGeometry(0.4, 0.4);
        leftFeedbackMesh = new THREE.Mesh(feedbackGeo, new THREE.MeshBasicMaterial({ map: this.texDogru, transparent: true, opacity: 0 }));
        leftFeedbackMesh.position.set(-0.06, 0, -2.5);
        scene.add(leftFeedbackMesh);

        rightFeedbackMesh = leftFeedbackMesh.clone();
        rightFeedbackMesh.position.set(0.06, 0, -2.5);
        scene.add(rightFeedbackMesh);

        window.addEventListener('mousemove', (e) => {
          targetX = ((e.clientX / window.innerWidth) * 2 - 1) * 2.2;
          targetY = (-(e.clientY / window.innerHeight) * 2 + 1) * 1.8;
        });
      }

      function guncelleSkorPaneli() {
        function createScoreTexture(skorDegeri) {
          let canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 64;
          let ctx = canvas.getContext('2d');
          ctx.fillStyle = '#2C3E50'; ctx.fillRect(0, 0, 256, 64);
          ctx.fillStyle = '#FFFFFF'; ctx.font = 'Bold 32px sans-serif';
          ctx.textAlign = 'center'; ctx.fillText('SKOR: ' + skorDegeri, 128, 44);
          return new THREE.CanvasTexture(canvas);
        }
        let yeniDoku = createScoreTexture(skor);
        leftScoreText.material.map = yeniDoku; leftScoreText.material.needsUpdate = true;
        rightScoreText.material.map = yeniDoku; rightScoreText.material.needsUpdate = true;
      }

      function tetikleGeriBildirim(durum) {
        let seciliDoku = durum === "dogru" ? this.texDogru : this.texYanlis;
        leftFeedbackMesh.material.map = seciliDoku; leftFeedbackMesh.material.opacity = 1; leftFeedbackMesh.material.needsUpdate = true;
        rightFeedbackMesh.material.map = seciliDoku; rightFeedbackMesh.material.opacity = 1; rightFeedbackMesh.material.needsUpdate = true;
        feedbackGosterimZamani = performance.now();
      }

      function createTarget(x, y, z, yon, renk) {
        const geo = new THREE.BoxGeometry(0.45, 0.35, 0.08);
        const mat = new THREE.MeshLambertMaterial({ color: renk });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        mesh.userData = { yon: yon, orijinalRenk: renk };
        scene.add(mesh);
      }

      function handleOrientation(event) {
        if (!event.gamma || !event.beta) return;
        targetX = (event.gamma / 22) * 2.2; 
        targetY = ((event.beta - 65) / 20) * 1.8;
      }

      function hacimliOkUret() {
        if (aktifOk) {
          scene.remove(aktifOk);
          aktifOk = null;
        }

        const kuralTipi = Math.random() > 0.5 ? "mavi" : "turuncu";
        okRengi = kuralTipi === "mavi" ? 0x00D2FF : 0xFF9F43;

        const yonler = ["sol", "sag", "yukari", "asagi"];
        akissYonu = yonler[Math.floor(Math.random() * yonler.length)];
        let ucYonu = yonler[Math.floor(Math.random() * yonler.length)];

        dogruYon = (kuralTipi === "mavi") ? akissYonu : ucYonu;

        aktifOk = new THREE.Group();

        const govdeGeo = new THREE.BoxGeometry(0.25, 0.45, 0.25);
        const mat = new THREE.MeshStandardMaterial({ color: okRengi, roughness: 0.2, metalness: 0.1 });
        const govdeMesh = new THREE.Mesh(govdeGeo, mat);
        govdeMesh.position.y = -0.15;
        aktifOk.add(govdeMesh);

        const ucGeo = new THREE.ConeGeometry(0.28, 0.35, 4);
        const ucMesh = new THREE.Mesh(ucGeo, mat);
        ucMesh.position.y = 0.25;
        ucMesh.rotation.y = Math.PI / 4; 
        aktifOk.add(ucMesh);

        if (ucYonu === "sol") aktifOk.rotation.z = Math.PI / 2;
        if (ucYonu === "sag") aktifOk.rotation.z = -Math.PI / 2;
        if (ucYonu === "asagi") aktifOk.rotation.z = Math.PI;

        let startX = 0, startY = 0;
        if (akissYonu === "sol") startX = 2.0;
        if (akissYonu === "sag") startX = -2.0;
        if (akissYonu === "yukari") startY = -1.4;
        if (akissYonu === "asagi") startY = 1.4;

        aktifOk.position.set(startX, startY, -3.2);
        scene.add(aktifOk);
      }

      // --- YENİLENEN REHABİLİTASYON UYUMLU SEÇİM MOTORU ---
      function kontrolEt() {
        let clockYon = "";
        
        // Eşik değerleri (Kutular X:1.8, Y:1.4'te olmasına rağmen, algılama X:0.5 ve Y:0.4'te başlar)
        // Böylece hasta başını sadece hafifçe o yöne doğru büktüğünde hamle geçerli sayılır.
        if (currentY > 0.45 && Math.abs(currentX) < 0.4) clockYon = "yukari";
        else if (currentY < -0.45 && Math.abs(currentX) < 0.4) clockYon = "asagi";
        else if (currentX < -0.55 && Math.abs(currentY) < 0.4) clockYon = "sol";
        else if (currentX > 0.55 && Math.abs(currentY) < 0.4) clockYon = "sag";

        if (clockYon === dogruYon) {
          skor += 10;
          guncelleSkorPaneli();
          tetikleGeriBildirim("dogru");
          oynatSes("dogru");
          cevapGeriBildirimi(clockYon, 0x00FF66); 
          hacimliOkUret();
        } else if (clockYon !== "" && clockYon !== dogruYon) {
          tetikleGeriBildirim("yanlis");
          oynatSes("yanlis");
          cevapGeriBildirimi(clockYon, 0xFF3333); 
          hacimliOkUret();
        }
      }

      function cevapGeriBildirimi(yon, renkKodu) {
        scene.traverse((object) => {
          if (object.userData && object.userData.yon === yon) {
            object.material.color.setHex(renkKodu);
            setTimeout(() => {
              object.material.color.setHex(object.userData.orijinalRenk);
            }, 300);
          }
        });
      }

      function animate(time) {
        if (!oyunAktif) return;
        requestAnimationFrame(animate);

        if (time - sonOkZamani > 6000 || !aktifOk) {
          hacimliOkUret();
          sonOkZamani = time;
        }

        currentX += (targetX - currentX) * yumusatma;
        currentY += (targetY - currentY) * yumusatma;

        leftCursor.position.set(currentX - 0.06, currentY, -2.8);
        rightCursor.position.set(currentX + 0.06, currentY, -2.8);

        if (time - feedbackGosterimZamani > 600) {
          leftFeedbackMesh.material.opacity *= 0.8;
          rightFeedbackMesh.material.opacity *= 0.8;
        }

        if (aktifOk) {
          if (akissYonu === "sol") aktifOk.position.x -= okHizi;
          if (akissYonu === "sag") aktifOk.position.x += okHizi;
          if (akissYonu === "yukari") aktifOk.position.y += okHizi;
          if (akissYonu === "asagi") aktifOk.position.y -= okHizi;

          if (Math.abs(aktifOk.position.x) > 2.4 || Math.abs(aktifOk.position.y) > 1.8) {
            tetikleGeriBildirim("yanlis");
            oynatSes("yanlis"); 
            hacimliOkUret();
          }
          kontrolEt();
        }

        // Sol Göz Çizimi
        leftCursor.visible = true; rightCursor.visible = false;
        renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setScissorTest(true);
        renderer.render(scene, leftCamera);

        // Sağ Göz Çizimi
        leftCursor.visible = false; rightCursor.visible = true;
        renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
        renderer.setScissorTest(true);
        renderer.render(scene, rightCamera);
      }

      window.addEventListener('resize', () => {
        if (!oyunAktif) return;
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height);
        leftCamera.aspect = (width / 2) / height;
        leftCamera.updateProjectionMatrix();
        rightCamera.aspect = (width / 2) / height;
        rightCamera.updateProjectionMatrix();
      });
    </script>
  </body>
</html>
