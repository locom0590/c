<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Neuro-Rehabilitation: Dual-Task Arrows</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/0.9.2/aframe-master.min.js"></script>
    <script>
      // OYUN PARAMETRELERİ
      let mevcutSeviye = 1;
      let oyunAktif = false;
      let okUretimInterval;
      let aktifOk = null;
      let dogruYon = ""; // "sol", "sag", "yukari", "asagi"
      
      const seviyeHizlari = {
        1: 0.02, 2: 0.03, 3: 0.04, 4: 0.05, 5: 0.06,
        6: 0.07, 7: 0.08, 8: 0.09, 9: 0.11, 10: 0.13
      };

      // Yönlere ait rotasyon değerleri (Okun ucunun baktığı yer için)
      const yonRotasyonlari = {
        "sol": "0 0 90",
        "sag": "0 0 -90",
        "yukari": "0 0 0",
        "asagi": "0 0 180"
      };

      // MENÜ BİLEŞENİ
      AFRAME.registerComponent('menu-butonu', {
        schema: { tip: {type: 'string'}, deger: {type: 'int'} },
        init: function () {
          this.el.addEventListener('mouseenter', () => {
            if (oyunAktif) return;
            if (this.data.tip === 'seviye') {
              mevcutSeviye = this.data.deger;
              document.querySelector('#menuHizTxt').setAttribute('value', 'Hiz Seviyesi: ' + mevcutSeviye);
            } else if (this.data.tip === 'basla') {
              oyunBaslat();
            }
          });
        }
      });

      // HASTANIN CEVAP BUTONLARI İÇİN BİLEŞEN
      AFRAME.registerComponent('cevap-butonu', {
        schema: { yon: {type: 'string'} },
        init: function () {
          this.el.addEventListener('mouseenter', () => {
            if (!oyunAktif || !aktifOk) return;
            
            // Hastanın baktığı yön doğru mu kontrol et
            if (this.data.yon === dogruYon) {
              // Doğru cevap efekti (Yeşil flaş)
              this.el.setAttribute('color', '#2ECC71');
              okSil(true);
            } else {
              // Yanlış cevap efekti (Kırmızı flaş)
              this.el.setAttribute('color', '#E74C3C');
              okSil(false);
            }
            
            // 300ms sonra buton rengini eski nötr haline getir
            setTimeout(() => {
              this.el.setAttribute('color', '#BDC3C7');
            }, 300);
          });
        }
      });

      // 3D OK HAREKET MOTORU
      AFRAME.registerComponent('ok-motoru', {
        schema: {
          akissYonu: {type: 'string'},
          hiz: {type: 'number'}
        },
        tick: function () {
          if (!oyunAktif) return;
          let pos = this.el.getAttribute('position');
          
          // Okun ekrandaki fiziksel akış hareketi
          switch(this.data.akissYonu) {
            case "sol": pos.x -= this.data.hiz; break;
            case "sag": pos.x += this.data.hiz; break;
            case "yukari": pos.y += this.data.hiz; break;
            case "asagi": pos.y -= this.data.hiz; break;
          }
          this.el.setAttribute('position', pos);

          // Ok ekran sınırlarının dışına çıkarsa (Hasta kaçırırsa) sil ve yeniye geç
          if (Math.abs(pos.x) > 3.5 || Math.abs(pos.y - 2) > 2.5) {
            okSil(false);
          }
        }
      });

      function oyunBaslat() {
        oyunAktif = true;
        document.querySelector('#anaMenuGrup').setAttribute('visible', 'false');
        document.querySelector('#anaMenuGrup').removeAttribute('class');
        
        // Yanlardaki klinik cevap panellerini görünür yap
        document.querySelector('#cevapPanelleri').setAttribute('visible', 'true');
        
        okUretimInterval = setInterval(hacimliOkUret, 4000);
        hacimliOkUret();
      }

      function okSil(basarili) {
        if (aktifOk) {
          aktifOk.parentNode.removeChild(aktifOk);
          aktifOk = null;
        }
        // Parkinson/Hemipleji hastasını yormamak adına iki ok arası güvenli bekleme süresi
        setTimeout(hacimliOkUret, 600);
      }

      function hacimliOkUret() {
        if (!oyunAktif || aktifOk) return;

        let scene = document.querySelector('a-scene');
        aktifOk = document.createElement('a-entity');

        // %50 ihtimalle Mavi (Akış Yönü) veya Turuncu (Uç Yönü) kuralı seçilir
        let kuralTipi = Math.random() > 0.5 ? "mavi" : "turuncu";
        let okRengi = kuralTipi === "mavi" ? "#3498DB" : "#E67E22";

        // Olası tüm yön havuzu
        const yonler = ["sol", "sag", "yukari", "asagi"];
        let akissYonu = yonler[Math.floor(Math.random() * yonler.length)];
        let ucYonu = yonler[Math.floor(Math.random() * yonler.length)];

        // Kural setine göre klinik doğruluk hedefinin belirlenmesi
        if (kuralTipi === "mavi") {
          dogruYon = akissYonu; // Mavi ise nereye akıyorsa orası doğru
        } else {
          dogruYon = ucYonu;    // Turuncu ise ucun gösterdiği yer doğru
        }

        // Okun başlangıç pozisyonu (Akış yönünün tersinden merkez ekran alanına doğru doğar)
        let baslangicX = 0;
        let baslangicY = 2; // Göz hizası
        if (akissYonu === "sol") baslangicX = 2.5;
        if (akissYonu === "sag") baslangicX = -2.5;
        if (akissYonu === "yukari") baslangicY = 0.2;
        if (akissYonu === "asagi") baslangicY = 3.8;

        aktifOk.setAttribute('position', `${baslangicX} ${baslangicY} -3`);
        aktifOk.setAttribute('rotation', yonRotasyonlari[ucYonu]);

        // --- HACİMLİ 3D OK GEOMETRİSİ (Ebb & Flow kalınlığında gövde ve uç birleşimi) ---
        // 1. Okun Kuyruğu / Gövdesi (Kalın Dikdörtgen Blok)
        let govde = document.createElement('a-box');
        govde.setAttribute('width', '0.22');
        govde.setAttribute('height', '0.5');
        govde.setAttribute('depth', '0.22');
        govde.setAttribute('color', okRengi);
        govde.setAttribute('position', '0 -0.15 0');
        aktifOk.appendChild(govde);

        // 2. Okun Sivri Ucu (Hacimli Koni / Piramit)
        let uc = document.createElement('a-cone');
        uc.setAttribute('radius-bottom', '0.26');
        uc.setAttribute('height', '0.4');
        uc.setAttribute('color', okRengi);
        uc.setAttribute('position', '0 0.3 0');
        // Koni tabanını kareye yaklaştırmak ve derinlik hissi için segments segmentasyonu
        uc.setAttribute('segments-radial', '4'); 
        aktifOk.appendChild(uc);

        // Motor bileşenini yükle
        aktifOk.setAttribute('ok-motoru', {
          akissYonu: akissYonu,
          hiz: seviyeHizlari[mevcutSeviye]
        });

        scene.appendChild(aktifOk);
      }
    </script>
    <style>
      /* VR Modu Stereo geçiş butonu optimizasyonu */
      .a-enter-vr-button {
        background-color: #2ECC71 !important;
        width: 80px !important;
        height: 80px !important;
        border-radius: 50% !important;
        bottom: 30px !important;
        right: 30px !important;
        display: block !important;
        visibility: visible !important;
        z-index: 99999 !important;
      }
    </style>
  </head>
  <body>

    <a-scene embedded vr-mode-ui="enabled: true">
      <a-sky color="#1A252F"></a-sky>

      <a-entity camera look-controls position="0 2 0">
        <a-cursor id="cursor" 
                  raycaster="objects: .tıklanabilir" 
                  material="color: #FFFFFF; shader: flat" 
                  position="0 0 -1" 
                  geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025">
        </a-cursor>
      </a-entity>

      <a-entity id="anaMenuGrup" position="0 2.2 -2.5">
        <a-plane color="#2C3E50" width="2.4" height="1.6" opacity="0.98"></a-plane>
        <a-text value="DUAL-TASK ARROWS" align="center" position="0 0.6 0.05" width="4.5" color="#ECF0F1"></a-text>
        <a-text id="menuHizTxt" value="Hiz Seviyesi: 1" align="center" position="0 0.2 0.05" width="3.5" color="#F1C40F"></a-text>

        <a-text value="Hiz:" position="-0.9 -0.1 0.05" width="2.5" color="#FFF"></a-text>
        <a-box class="tıklanabilir" menu-butonu="tip: seviye; deger: 1" position="-0.3 -0.1 0.05" width="0.18" height="0.15" depth="0.05" color="#E67E22"><a-text value="Yavas" align="center" position="0 0 0.03" width="2.2"></a-text></a-box>
        <a-box class="tıklanabilir" menu-butonu="tip: seviye; deger: 4" position="0.0 -0.1 0.05" width="0.18" height="0.15" depth="0.05" color="#E67E22"><a-text value="Orta" align="center" position="0 0 0.03" width="2.2"></a-text></a-box>
        <a-box class="tıklanabilir" menu-butonu="tip: seviye; deger: 8" position="0.3 -0.1 0.05" width="0.18" height="0.15" depth="0.05" color="#E67E22"><a-text value="Hizli" align="center" position="0 0 0.03" width="2.2"></a-text></a-box>

        <a-box class="tıklanabilir" menu-butonu="tip: basla" position="0 -0.5 0.05" width="0.8" height="0.22" depth="0.05" color="#2ECC71">
          <a-text value="EGZERSIZE BASLA" align="center" position="0 0 0.03" width="3.5" color="#FFF"></a-text>
        </a-box>
      </a-entity>

      <a-entity id="cevapPanelleri" visible="false">
        <a-box id="btnYukari" class="tıklanabilir" cevap-butonu="yon: yukari" position="0 3.6 -3.2" width="0.5" height="0.3" depth="0.1" color="#BDC3C7">
          <a-text value="YUKARI" align="center" position="0 0 0.06" width="3" color="#2C3E50"></a-text>
        </a-box>

        <a-box id="btnAsagi" class="tıklanabilir" cevap-butonu="yon: asagi" position="0 0.4 -3.2" width="0.5" height="0.3" depth="0.1" color="#BDC3C7">
          <a-text value="ASAGI" align="center" position="0 0 0.06" width="3" color="#2C3E50"></a-text>
        </a-box>

        <a-box id="btnSol" class="tıklanabilir" cevap-butonu="yon: sol" position="-2.0 2.0 -3.2" width="0.4" height="0.5" depth="0.1" color="#BDC3C7">
          <a-text value="SOL" align="center" position="0 0 0.06" width="3" color="#2C3E50"></a-text>
        </a-box>

        <a-box id="btnSag" class="tıklanabilir" cevap-butonu="yon: sag" position="2.0 2.0 -3.2" width="0.4" height="0.5" depth="0.1" color="#BDC3C7">
          <a-text value="SAG" align="center" position="0 0 0.06" width="3" color="#2C3E50"></a-text>
        </a-box>
      </a-entity>

    </a-scene>
  </body>
</html>
